<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>TicoAuto - Buscador de Vehículos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ICONOS BOOTSTRAP -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="stylesheet" href="css/filtroVehiculos.css">

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">

        <!-- MENU DE 3 PUNTOS -->
        <div id="menuOpciones"></div>

        <div class="titulo-centro">
            TicoAuto
        </div>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menuNav">

            <!-- CONTENIDO DERECHA -->
            <div class="ms-auto d-flex align-items-center">

                <!-- USUARIO -->
                <span class="text-white fs-5 me-3" id="nombreUsuario"></span>

                <div id="botonesUsuario"></div>

            </div>

        </div>

    </nav>


    <div class="container py-4">

        <h1 class="text-center mb-4"> --- Buscar Vehículos --- </h1>

        <!-- FILTROS -->
        <div class="card filtros-card mb-4">
            <div class="card-body">

                <div class="row g-3">

                    <div class="col-md-3">
                        <label class="form-label">Marca</label>
                        <input type="text" id="marca" class="form-control" placeholder="Toyota">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Modelo</label>
                        <input type="text" id="modelo" class="form-control" placeholder="Corolla">
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Año Mín</label>
                        <input type="number" id="minAnno" class="form-control" placeholder="2000">
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Año Máx</label>
                        <input type="number" id="maxAnno" class="form-control" placeholder="2026">
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Estado</label>
                        <select id="estado" class="form-select">
                            <option value="">Todos</option>
                            <option value="Disponible">Disponible</option>
                            <option value="Vendido">Vendido</option>
                        </select>
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Precio Mín</label>
                        <input type="number" id="minPrecio" class="form-control" placeholder="10000">
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Precio Máx</label>
                        <input type="number" id="maxPrecio" class="form-control" placeholder="1000000">
                    </div>

                    <div class="col-md-2 d-flex align-items-end">
                        <button onclick="ejecutarBusqueda()" class="btn btn-primary w-100">
                            Buscar
                        </button>
                    </div>

                    <div class="col-md-2 d-flex align-items-end">
                        <button onclick="refrescar()" class="btn btn-primary w-100">
                            Refrescar
                        </button>
                    </div>

                </div>

            </div>
        </div>

        <div class="row" id="vehiculosContainer">
            <!-- Aquí se generarán las cards -->
        </div>
        <div class="d-flex justify-content-center gap-3 mt-4">
            <button class="btn btn-primary" onclick="paginaAnterior()">Anterior</button>

            <span id="numeroPagina" class="numero-pagina">1</span>

            <button class="btn btn-primary" onclick="paginaSiguiente()">Siguiente</button>
        </div>

    </div>

    <script src =/js/vehiculo/configuracion.js></script>
    <script src="/js/vehiculo/verificarUsuario.js"></script>
    <script src="/js/vehiculo/accionesVehiculo.js"></script>
    <script src="/js/vehiculo/mostrarVehiculos.js"></script>
    <script src="/js/vehiculo/filtroVehiculos.js"></script>


    <!-- JS BOOTSTRAP (necesario para dropdown) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
