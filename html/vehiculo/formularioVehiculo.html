<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario Vehículo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS personalizado -->
    <link rel="stylesheet" href="../../css/formularioVehiculo.css">
</head>
<body>

<div class="container mt-5 mb-5 formulario-container">

    <h1 class="mb-4 text-center">Formulario Vehículo</h1>

    <form id="formVehiculo" enctype="multipart/form-data">
        <input type="hidden" id="vehiculoId">

        <div class="mb-3">
            <input type="text" id="marca" placeholder="Marca" class="form-control" required>
        </div>

        <div class="mb-3">
            <input type="text" id="modelo" placeholder="Modelo" class="form-control" required>
        </div>

        <div class="mb-3">
            <input type="number" id="anno" placeholder="Año" min="1886" max="2026" class="form-control" required>
        </div>

        <div class="mb-3">
            <input type="number" id="precio" placeholder="Precio" min="0" class="form-control" required>
        </div>

        <div class="mb-3">
            <input type="file" id="imagen" accept="image/*" class="form-control">
            <img id="vistaPrevia" class="img-fluid mt-3 rounded shadow" 
                 style="max-height: 200px; display: none;">
        </div>

        <div class="d-flex justify-content-end gap-3 mt-4">
            <button type="button" class="btn btn-guardar px-4" onclick="guardarVehiculo()">
                Guardar
            </button>
            <button type="button" class="btn btn-regresar px-4" onclick="regresar()">
                Regresar
            </button>
        </div>

    </form>

</div>

<script src="../../js/vehiculo/formularioVehiculo.js" defer></script>
</body>
</html>
