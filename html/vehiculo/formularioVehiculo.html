<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Vehículo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

    <h1>Crear Vehículo</h1>

    <form id="formVehiculo" enctype="multipart/form-data">
        <div class="mb-3">
            <input type="hidden" id="vehiculoId" name="vehiculoId">
        </div>
        
        <div class="mb-3">
            <input type="text" id="marca" name="marca" placeholder="Marca" class="form-control" required>
        </div>
        <div class="mb-3">
            <input type="text" id="modelo" name="modelo" placeholder="Modelo" class="form-control" required>
        </div>
        <div class="mb-3">
            <input type="number" id="anno" name="anno" placeholder="Año" min="1886" max="2026" class="form-control" required>
        </div>
        <div class="mb-3">
            <input type="number" id="precio" name="precio" placeholder="Precio" min="0" class="form-control" required>
        </div>
        <div class="mb-3">
            <input type="file" id="imagen" name="imagen" accept="image/*" class="form-control" required>
        </div>
        <button type="submit" id="btnGuardar" class="btn btn-primary">Guardar</button>
        <button type="button" onclick="location.href='#'" class="btn btn-secondary">Regresar</button>
    </form>


    <script src="../../js/vehiculo/formularioVehiculo.js" defer></script>

</body>
</html>
