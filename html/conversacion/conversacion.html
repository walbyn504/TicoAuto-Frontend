<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis mensajes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../css/mensajes.css">
</head>

<body class="pagina-mensajes">

    <div class="container mt-4">
        <div class="row chat-wrapper g-0">

            <div class="col-4 sidebar">
                <div class="sidebar-header">
                    <button class="btn-volver" onclick="volverPagina()" title="Volver">
                        <i class="bi bi-arrow-left"></i>
                    </button>
                </div>

                <div id="listaConversaciones"></div>

                <div class="sidebar-footer">
                    <div class="sidebar-user-info">
                        <div class="sidebar-user-avatar">
                            <i class="bi bi-person-fill"></i>
                        </div>

                        <div class="sidebar-user-text">
                            <div id="nombreUsuarioConectado" class="sidebar-user-name">Usuario</div>
                            <div class="sidebar-user-role">Sesión activa</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-8 p-0">
                <div class="chat-area">
                    <div class="chat-header">
                        <div class="chat-header-info">
                            <span id="encabezadoChat">No has iniciado una conversación</span>
                            <small class="chat-subtitle">Consulta y responde mensajes de vehículos</small>
                        </div>
                    </div>

                    <div class="chat-body" id="mensajesChat"></div>

                    <div class="chat-footer">
                        <div class="input-group chat-input-group">
                            <textarea id="textoPregunta" class="form-control chat-textarea" rows="2"
                                placeholder="Escribe tu mensaje"></textarea>

                            <button class="btn btn-enviar" onclick="enviarMensaje()">
                                <i class="bi bi-send-fill me-1"></i>
                                Enviar
                            </button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>


    <script src="../../js/mensajes/utilidades.js"></script>

    <script src="../../js/mensajes/preguntas.js"></script>
    <script src="../../js/mensajes/respuestas.js"></script>

    <script src="../../js/mensajes/interfazMensajes.js"></script>
    <script src="../../js/mensajes/conversaciones.js"></script>

    <script src="../../js/mensajes/enviarMensaje.js"></script>

</body>

</html>
