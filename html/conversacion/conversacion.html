<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis mensajes</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../css/mensajes.css">
</head>

<body class="bg-light">

<div class="container mt-4">
    <div class="row chat-wrapper bg-white">

        <!-- Sidebar conversaciones -->
        <div class="col-4 sidebar" id="listaConversaciones"></div>

        <!-- Área del chat -->
        <div class="col-8">
            <div class="chat-area">

                <!-- Encabezado -->
                <div class="chat-header">

                    <button class="btn btn-light" onclick="volverPagina()" title="Volver">
                        <i class="bi bi-arrow-left"></i>
                    </button>

                    <span id="encabezadoChat">
                        No has iniciado una conversación
                    </span>

                </div>

                <!-- Mensajes -->
                <div class="chat-body" id="mensajesChat"></div>

                <!-- Escribir mensaje -->
                <div class="chat-footer">
                    <div class="input-group">
                        <textarea id="textoPregunta"
                                  class="form-control"
                                  rows="2"
                                  placeholder="Escribe tu pregunta"></textarea>

                        <button class="btn btn-primary" onclick="enviarMensaje()">
                            Enviar
                        </button>
                    </div>
                </div>

            </div>
        </div>

    </div>
</div>

<!-- Scripts -->
<script src="../../js/mensajes/enviarPregunta.js"></script>
<script src="../../js/mensajes/respuestas.js"></script>
<script src="../../js/mensajes/preguntas.js"></script>
<script src="../../js/mensajes/conversaciones.js"></script>


</body>
</html>
