<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis mensajes</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../css/mensajes.css">
</head>

<body class="bg-light">

    <div class="container mt-4">
        <div class="row chat-wrapper bg-white">

            <!-- Sidebar conversaciones -->
            <div class="col-4 sidebar" id="listaConversaciones"></div>

            <!-- Área del chat -->
            <div class="col-8">
                <div class="chat-area">

                    <!-- Encabezado del chat -->
                    <div class="chat-header">

                        <!-- Botón volver -->
                        <button class="btn btn-light" onclick="volverPagina()" title="Volver">
                            <i class="bi bi-arrow-left"></i>
                        </button>

                        <!-- Título conversación -->
                        <span id="encabezadoChat">
                            No has iniciado una conversación
                        </span>

                    </div>

                    <!-- Mensajes -->
                    <div class="chat-body" id="mensajesChat"></div>

                    <!-- Campo escribir mensaje -->
                    <div class="chat-footer">
                        <div class="input-group">
                            <textarea id="textoPregunta" class="form-control" rows="2" placeholder="Escribe tu pregunta"></textarea>
                            <button class="btn btn-primary" onclick="enviarPregunta()">Enviar</button>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <!-- Scripts -->
    <script src="../../js/mensajes/enviarPregunta.js"></script>
    <script src="../../js/mensajes/conversaciones.js"></script>
    <script src="../../js/mensajes/preguntas.js"></script>

    <script>
        // Función para volver a la página anterior
        function volverPagina() {
            window.history.back();
        }
    </script>

</body>
</html>
