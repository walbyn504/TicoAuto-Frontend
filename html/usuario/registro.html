<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro de Usuario</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../css/registro.css">
</head>

<div class="panel-formulario">

    <!-- TITULO DERECHA -->
    <div class="contenedor-titulo">
        <h1 class="titulo-derecha">Registro de Usuario</h1>
    </div>

    <!-- FORMULARIO IZQUIERDA -->
    <div class="card-neon">
        <input type="text" id="nombre" class="form-control input-neon mb-3" placeholder="Nombre">
        <input type="text" id="primerApellido" class="form-control input-neon mb-3" placeholder="Primer Apellido">
        <input type="text" id="segundoApellido" class="form-control input-neon mb-3" placeholder="Segundo Apellido">
        <input type="email" id="correo" class="form-control input-neon mb-3" placeholder="Correo Electrónico">
        <input type="password" id="contrasenna" class="form-control input-neon mb-4" placeholder="Contraseña" autocomplete="new-password">

        <div class="d-grid gap-2">
            <button onclick="registrarUsuario()" class="btn boton-neon">Registrar</button>
            <button class="btn btn-outline-light">Regresar</button>
        </div>
    </div>


</div>
</html>
