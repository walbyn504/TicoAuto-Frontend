<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Inicio de Sesión</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../../css/inicioSesion.css">
</head>

<body>

<div class="contenedor-login">

    <div class="card-login">

        <h2 class="titulo-login mb-4 text-center">Iniciar Sesión</h2>

        <input type="email" 
               id="correo" 
               class="form-control input-auto mb-3" 
               placeholder="Correo Electrónico">

        <input type="password" 
               id="contrasenna" 
               class="form-control input-auto mb-4" 
               placeholder="Contraseña" 
               autocomplete="new-password">

        <div class="d-grid gap-2">
            <button onclick="iniciarSesion()" 
                    class="btn btn-auto">
                Ingresar
            </button>

            <a href="registro.html" class="link-crear">
                ¿No tienes cuenta? Regístrate
            </a>
        </div>

    </div>

</div>

<script src="../../js/usuario/inicioSesion.js" defer></script>

</body>
</html>
